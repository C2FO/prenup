name: Validate Changelog

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
        with:
          fetch-depth: 0

      - name: Validate changelog
        run: |
          docker run --rm \
            -v "$(pwd):/workspace" \
            ghcr.io/c2fo/releasegen:v1 \
            validate --repo-root /workspace
